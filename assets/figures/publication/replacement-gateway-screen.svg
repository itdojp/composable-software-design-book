<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="560" viewBox="0 0 1160 560" role="img" aria-labelledby="replacement-gateway-screen-title replacement-gateway-screen-description">
<title id="replacement-gateway-screen-title">Legacy and replacement routes joined at one gateway</title>
<desc id="replacement-gateway-screen-description">The diagram contains Shared Boundary, Legacy Route Mapper, Replacement Mapper, Unified Review Gateway. Directed connections represent legacy boundary map i_L, replacement boundary map i_R, legacy cocone q_L, replacement cocone q_R.</desc>
<rect width="100%" height="100%" fill="#fbfcfe"/>
<defs>
<marker id="arrow-screen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
<path d="M0,0 L12,6 L0,12 z" fill="#43516d"/>
</marker>
</defs>
<g style="color:#172033">
<line x1="270" y1="262.0" x2="420" y2="142.0" stroke="#43516d" stroke-width="4" marker-end="url(#arrow-screen)"/>
<text x="345.0" y="188.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="middle">legacy boundary map i_L</text>
<line x1="270" y1="262.0" x2="420" y2="382.0" stroke="#43516d" stroke-width="4" marker-end="url(#arrow-screen)"/>
<text x="345.0" y="308.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="middle">replacement boundary map i_R</text>
<line x1="650" y1="142.0" x2="840" y2="262.0" stroke="#43516d" stroke-width="4" marker-end="url(#arrow-screen)"/>
<text x="745.0" y="188.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="middle">legacy cocone q_L</text>
<line x1="650" y1="382.0" x2="840" y2="262.0" stroke="#43516d" stroke-width="4" marker-end="url(#arrow-screen)"/>
<text x="745.0" y="308.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="500" text-anchor="middle">replacement cocone q_R</text>
<rect x="70" y="230" width="200" height="64" rx="18" ry="18" fill="#edf4ff" stroke="#5f7db4" stroke-width="3"/>
<text x="170.0" y="269.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" text-anchor="middle">Shared Boundary</text>
<rect x="420" y="110" width="230" height="64" rx="18" ry="18" fill="#edf4ff" stroke="#5f7db4" stroke-width="3"/>
<text x="535.0" y="149.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" text-anchor="middle">Legacy Route Mapper</text>
<rect x="420" y="350" width="230" height="64" rx="18" ry="18" fill="#edf4ff" stroke="#5f7db4" stroke-width="3"/>
<text x="535.0" y="389.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" text-anchor="middle">Replacement Mapper</text>
<rect x="840" y="230" width="240" height="64" rx="18" ry="18" fill="#dde8ff" stroke="#2f5cb4" stroke-width="3"/>
<text x="960.0" y="269.0" fill="currentColor" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="600" text-anchor="middle">Unified Review Gateway</text>
</g></svg>